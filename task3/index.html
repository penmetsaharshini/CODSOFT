<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pro Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #74abe2, #5563b1);
        }

        .calculator {
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            width: 340px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .display {
            height: 80px;
            background: rgba(0,0,0,0.3);
            color: #00ffcc;
            font-size: 36px;
            text-align: right;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            overflow-x: auto;
            white-space: nowrap;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            height: 60px;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }

        button:active {
            transform: scale(0.92);
        }

        /* Color Schemes */
        .number {
            background: rgba(255,255,255,0.1);
        }

        .operator {
            background: #f39c12;
        }

        .clear {
            background: #e74c3c;
        }

        .delete {
            background: #34495e;
        }

        .equal {
            background: #27ae60;
            grid-column: span 1; /* Keeping it standard */
        }

        .zero {
            grid-column: span 2;
            background: rgba(255,255,255,0.1);
        }

        button:hover {
            filter: brightness(1.3);
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div class="calculator">
    <div id="display" class="display">0</div>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="delete" onclick="backspace()">DEL</button>
        <button class="operator" onclick="append('%')">%</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">×</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">−</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="zero" onclick="append('0')">0</button>
        <button class="number" onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");
    let resetDisplay = false;

    function append(value) {
        // If there was an error or a previous calculation result, reset on new number click
        if (display.innerText === "0" || resetDisplay) {
            display.innerText = value;
            resetDisplay = false;
        } else {
            display.innerText += value;
        }
    }

    function clearDisplay() {
        display.innerText = "0";
        resetDisplay = false;
    }

    function backspace() {
        if (display.innerText.length > 1 && display.innerText !== "Error") {
            display.innerText = display.innerText.slice(0, -1);
        } else {
            display.innerText = "0";
        }
    }

    function calculate() {
        try {
            // Using a safer evaluation approach
            let result = eval(display.innerText);
            
            // Handle decimal points (limit to 4 digits for clean UI)
            if (!Number.isInteger(result)) {
                result = Math.round(result * 10000) / 10000;
            }
            
            display.innerText = result;
            resetDisplay = true;
        } catch (e) {
            display.innerText = "Error";
            resetDisplay = true;
        }
    }
</script>

</body>
</html>
